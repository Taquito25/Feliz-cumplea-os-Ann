<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños Anne</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a2d9ff 0%, #e1bee7 100%);
            --title-blue: #0077cc;
            --title-border-white: #ffffff;
            --cake-purple: #e1bee7; 
            --icing-purple-dark: #ab47bc; 
            --cake-body: #f3e5f5; 
            --border-color: #1a1a1a;
            --border-width: 4px;
            --text-dark: #333333; 
        }

        body {
            background: var(--bg-gradient);
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden; 
            font-family: 'Quicksand', sans-serif;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        #fw-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #tap-instruction {
            position: absolute; top: 20px;
            color: #555;
            font-size: 0.9rem; font-weight: 700;
            animation: pulse 1.5s infinite; z-index: 10;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .title-container { margin-bottom: 2vh; min-height: 8rem; z-index: 3; display: flex; align-items: center; justify-content: center;}
        .title {
            font-family: 'Archivo Black', sans-serif;
            color: var(--title-blue);
            font-size: clamp(2.2rem, 10vw, 4rem); 
            text-transform: uppercase;
            white-space: pre-wrap;
            line-height: 1.1;
            -webkit-text-stroke: 4px var(--title-border-white); 
            text-shadow: 5px 5px 0 rgba(0,0,0,0.1);
        }

        .cake-wrapper {
            display: flex; flex-direction: column; align-items: center; 
            position: relative; transform: scale(0.9); z-index: 3; margin-top: 20px;
        }
        .layer {
            position: relative; background-color: var(--cake-body);
            border: var(--border-width) solid var(--border-color);
            border-bottom: none; display: flex; justify-content: center;
            opacity: 0; animation: dropIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        .piso-base { width: 240px; height: 85px; border-bottom: var(--border-width) solid var(--border-color); border-radius: 10px 10px 20px 20px; animation-delay: 0.2s; }
        .piso-medio { width: 180px; height: 75px; border-radius: 10px 10px 0 0; animation-delay: 0.5s; }
        .piso-superior { width: 120px; height: 65px; border-radius: 10px 10px 0 0; animation-delay: 0.8s; }
        .icing { position: absolute; top: -2px; width: calc(100% + 8px); height: 60%; background-color: var(--cake-purple); border: var(--border-width) solid var(--border-color); border-radius: 0 0 25px 25px; z-index: 2; }
        
        .sprinkles-container { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .sprinkle.square { position: absolute; width: 8px; height: 8px; border-radius: 1px; }
        .cake-stand { width: 280px; height: 12px; background: #666; border: var(--border-width) solid var(--border-color); border-radius: 5px; margin-top: -4px; z-index: 1; }

        .candles-row { position: absolute; top: -35px; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; box-sizing: border-box; z-index: 4; }
        .candle { width: 10px; height: 35px; background: repeating-linear-gradient(45deg, #ab47bc, #ab47bc 5px, #fff 5px, #fff 10px); border: 2px solid var(--border-color); border-radius: 3px; position: relative; }
        .flame-cartoon {
            position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 26px; border: 2px solid var(--border-color);
            border-radius: 50% 50% 20% 20%; overflow: hidden;
            animation: flicker 0.15s infinite alternate; z-index: 10;
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.7);
            filter: blur(0.5px);
        }
        .flame-outer { position: absolute; width: 100%; height: 100%; background: #ff9800; }
        .flame-inner { position: absolute; top: 25%; left: 20%; width: 60%; height: 60%; background: #fffde7; border-radius: 50%; }

        @keyframes flicker { 0% { transform: translateX(-50%) scaleY(1); } 100% { transform: translateX(-50%) scaleY(1.2) scaleX(1.1); } }

        .dedicatoria-wrapper {
            margin-top: 3vh; width: 85%; max-width: 500px; z-index: 3;
            opacity: 0;
            animation: slideFromTop 1.5s ease-out forwards 2.5s;
        }
        .dedicatoria-texto {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 700;
            line-height: 1.5;
            color: var(--text-dark);
        }

        .confetti-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .confetti {
            position: absolute; width: 10px; height: 10px;
            opacity: 0.8; top: -20px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        @keyframes slideFromTop { 0% { opacity: 0; transform: translateY(-30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes dropIn { from { transform: translateY(-500px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body onclick="startExperience()">

    <canvas id="fw-canvas"></canvas>
    <div id="tap-instruction">Toca para Anne 🎵</div>
    <div class="confetti-container" id="confetti-container"></div>

    <div class="title-container">
        <div class="title" id="typewriterTitle"></div>
    </div>

    <div class="cake-wrapper">
        <div class="layer piso-superior">
            <div class="icing"></div><div class="sprinkles-container" id="s3"></div>
            <div class="candles-row"><div class="candle"><div class="flame-cartoon"><div class="flame-outer"></div><div class="flame-inner"></div></div></div></div>
        </div>
        <div class="layer piso-medio">
            <div class="icing"></div><div class="sprinkles-container" id="s2"></div>
            <div class="candles-row">
                <div class="candle"><div class="flame-cartoon"><div class="flame-outer"></div><div class="flame-inner"></div></div></div>
                <div class="candle"><div class="flame-cartoon"><div class="flame-outer"></div><div class="flame-inner"></div></div></div>
            </div>
        </div>
        <div class="layer piso-base">
            <div class="icing"></div><div class="sprinkles-container" id="s1"></div>
            <div class="candles-row">
                <div class="candle"><div class="flame-cartoon"><div class="flame-outer"></div><div class="flame-inner"></div></div></div>
                <div class="candle"><div class="flame-cartoon"><div class="flame-outer"></div><div class="flame-inner"></div></div></div>
                <div class="candle"><div class="flame-cartoon"><div class="flame-outer"></div><div class="flame-inner"></div></div></div>
            </div>
        </div>
        <div class="cake-stand"></div>
    </div>

    <div class="dedicatoria-wrapper">
        <div class="dedicatoria-texto">
            "¡Holaaaa Ann! Feliz cumpleaños, te deseo un gran día y muchas felicidades por otro año más. ATT: taquito"
        </div>
    </div>

    <audio id="birthdaySong" src="cancion.mp3"></audio>
    <audio id="explosionSound" src="explosion.mp3"></audio>

    <script>
        const song = document.getElementById('birthdaySong');
        const explosionAudio = document.getElementById('explosionSound');
        const instruction = document.getElementById('tap-instruction');
        const confettiContainer = document.getElementById('confetti-container');
        const canvas = document.getElementById('fw-canvas');
        const ctx = canvas.getContext('2d');
        
        let started = false;

        // Configuración de Volúmenes
        song.volume = 0.8; // Música al 80%
        explosionAudio.volume = 0.75; // Explosión al 75%

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // --- SISTEMA DE SONIDO CONTROLADO ---
        function playExplosionMP3() {
            // Solo se reproduce si el audio anterior ha terminado
            if (explosionAudio.paused || explosionAudio.ended) {
                explosionAudio.currentTime = 0; 
                explosionAudio.play();
            }
        }

        // --- SISTEMA DE FUEGOS ARTIFICIALES ---
        let particles = [];
        const colorsFW = ['#ab47bc', '#0077cc', '#ffffff', '#ffd54f', '#a2d9ff'];

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
                this.alpha = 1; this.friction = 0.95; this.gravity = 0.2;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
            update() {
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.velocity.y += this.gravity; this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height / 2.5);
            const color = colorsFW[Math.floor(Math.random() * colorsFW.length)];
            
            if (started) playExplosionMP3();

            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha > 0) { p.update(); p.draw(); } 
                else { particles.splice(i, 1); }
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Intervalo de fuegos artificiales
        setInterval(createFirework, 1500);

        // --- CONFETI ---
        function addConfettiPiece() {
            const colors = ['#ce93d8', '#00d2ff', '#ffeb3b', '#ff4081', '#ffffff'];
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
            confettiContainer.appendChild(confetti);
            confetti.addEventListener('animationend', () => confetti.remove());
        }
        setInterval(addConfettiPiece, 150);

        function startExperience() {
            if (started) return;
            started = true;
            instruction.style.display = 'none';
            song.play();
            createFirework(); 
        }

        const titleText = "FELIZ CUMPLEAÑOS\nANNE"; 
        let titleIdx = 0;
        function typeTitle() {
            if (titleIdx < titleText.length) {
                document.getElementById("typewriterTitle").textContent += titleText.charAt(titleIdx);
                titleIdx++;
                setTimeout(typeTitle, 100);
            }
        }
        
        window.onload = () => {
            setTimeout(typeTitle, 1300);
            const createSprinkles = (id, qty) => {
                const container = document.getElementById(id);
                const colors = ['#ce93d8', '#00d2ff', '#ffffff', '#ffd54f'];
                for (let i = 0; i < qty; i++) {
                    const s = document.createElement('div');
                    s.className = 'sprinkle square';
                    s.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    s.style.left = Math.random() * 90 + '%'; s.style.top = (Math.random() * 30 + 60) + '%';
                    s.style.transform = `rotate(${Math.random() * 360}deg)`;
                    container.appendChild(s);
                }
            };
            createSprinkles('s1', 15); createSprinkles('s2', 10); createSprinkles('s3', 5);
        };
    </script>
</body>
</html>
